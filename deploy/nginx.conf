server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # Cache agresivo para assets con hash en el nombre (generados por Vite)
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: cualquier ruta que no sea un archivo existente → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia el backend para llamadas /api/* desde el navegador
    # (solo útil si frontend y backend están detrás del mismo nginx)
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Deshabilitar acceso a ficheros ocultos
    location ~ /\. {
        deny all;
    }
}
